<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Sidebar</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <!-- Settings Panel (hidden by default) -->
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-header">
      <h3>Settings</h3>
      <button id="close-settings" class="icon-btn" title="Close">&#x2715;</button>
    </div>
    <form id="settings-form">
      <div class="form-group">
        <label for="api-url">API Endpoint URL</label>
        <input type="url" id="api-url" placeholder="https://api.openai.com" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="api-key">API Key</label>
        <div class="password-row">
          <input type="password" id="api-key" placeholder="sk-..." autocomplete="off">
          <button type="button" id="toggle-key" class="icon-btn small" title="Show/hide">&#x1f441;</button>
        </div>
      </div>
      <div class="form-group">
        <label for="model-name">Model Name</label>
        <input type="text" id="model-name" placeholder="gpt-4o" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="theme-select">Theme</label>
        <select id="theme-select">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="pixel">Pixel</option>
        </select>
      </div>
      <div class="form-group">
        <label for="system-prompt">Chat System Prompt</label>
        <textarea id="system-prompt" rows="3" placeholder="You are a helpful assistant..."></textarea>
      </div>
      <div class="form-group">
        <label for="summary-prompt">Summary System Prompt</label>
        <textarea id="summary-prompt" rows="3" placeholder="Summarize the following webpage..."></textarea>
      </div>
      <div class="settings-buttons">
        <button type="submit" class="btn btn-primary">Save</button>
        <button type="button" id="cancel-settings" class="btn btn-secondary">Cancel</button>
      </div>
    </form>
  </div>

  <!-- Header -->
  <div class="chat-header">
    <h2>LLM Sidebar</h2>
    <div class="header-actions">
      <button id="clear-chat" class="icon-btn" title="Clear chat">&#x1f5d1;</button>
      <button id="open-settings" class="icon-btn" title="Settings">&#x2699;</button>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="chat">Chat</button>
    <button class="tab-btn" data-tab="summary">Summary</button>
  </div>

  <!-- Chat View -->
  <div id="chat-view" class="tab-content active">
    <!-- Messages area -->
    <div id="messages" class="messages">
      <div class="welcome-msg">
        <p>Select text on any page and click <strong>"Ask LLM"</strong>, or type a question below.</p>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <textarea id="user-input" placeholder="Ask a question..." rows="2"></textarea>
      <button id="send-btn" class="btn btn-primary" title="Send">&#x27a4;</button>
    </div>
  </div>

  <!-- Summary View -->
  <div id="summary-view" class="tab-content">
    <div class="summary-toolbar">
      <span id="summary-page-title" class="summary-page-title">No page loaded</span>
      <button id="summarize-btn" class="btn btn-primary">Summarize Page</button>
    </div>
    <div class="summary-prompt-row">
      <input type="text" id="summary-custom-prompt" placeholder="Custom instruction (e.g. summarize in Chinese, key points only)...">
    </div>
    <div id="summary-content" class="summary-content">
      <div class="summary-placeholder">
        Click <strong>"Summarize Page"</strong> to generate a summary of the current page.
      </div>
    </div>
    <div id="summary-history" class="summary-history">
      <div class="history-header">
        <span class="history-title">History</span>
        <button id="clear-history" class="icon-btn small" title="Clear all">&#x1f5d1;</button>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
